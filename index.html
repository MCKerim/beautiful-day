<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beautiful Day</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      canvas { display: block; width: 100vw !important; height: 100vh !important; image-rendering: pixelated; }
      #overlay {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: rgba(0,0,0,0.7);
        color: #fff;
        font-family: monospace;
        font-size: 1.2rem;
        cursor: pointer;
        z-index: 10;
      }
      #overlay h1 { font-size: 2rem; margin-bottom: 1rem; letter-spacing: 0.2em; }
      #overlay p { opacity: 0.6; }
    </style>
  </head>
  <body>
    <div id="overlay">
      <h1>BEAUTIFUL DAY</h1>
      <p>click to start &mdash; WASD to move &mdash; mouse to look</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
